services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: ["azurite-blob", "--blobHost", "0.0.0.0", "--blobPort", "10000"]
    ports: ["10000:10000"]
    volumes: ["azurite:/data"]

  api:
    build: ./api
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
      azurite:  { condition: service_started }
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=portal;Username=portal;Password=portal"
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__AzureBlob: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      Jwt__Secret: "dev-secret-change-me-please-32-bytes-min-please-rotate"
      Jwt__Issuer: "secure-document-portal"
      Jwt__Audience: "secure-document-portal"
      Jwt__AccessMinutes: "15"
      Cors__AllowedOrigins__0: "http://localhost:8080"
    ports: ["5080:8080"]

  web:
    build: ./web
    depends_on: [api]
    environment:
      API_URL: "http://localhost:5080/api"
    ports: ["8080:80"]

volumes:
  pgdata:
  azurite:
