# Example only. In real deployments, source these from Azure Key Vault via
# the Secrets Store CSI driver. Do NOT commit a populated version of this file.
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: portal
type: Opaque
stringData:
  ConnectionStrings__Postgres: "Host=portal-pg.postgres.database.azure.com;Database=portal;Username=portal;Password=REPLACE;SslMode=Require"
  ConnectionStrings__Redis: "portal-redis:6379"
  ConnectionStrings__AzureBlob: "REPLACE_WITH_AZURE_STORAGE_CONN_STRING"
  Jwt__Secret: "REPLACE_WITH_32_BYTE_RANDOM_SECRET"
